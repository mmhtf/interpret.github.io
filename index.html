<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>The Editorial Scholar | Workspace</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#0040a1",
                      "on-primary": "#ffffff",
                      "primary-container": "#0056d2",
                      "secondary": "#516073",
                      "surface": "#f8f9fa",
                      "error": "#ba1a1a",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-low": "#f3f4f5",
                      "surface-container-high": "#e7e8e9",
                      "tertiary": "#940010",
                      "on-tertiary": "#ffffff",
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "body": ["Inter"],
              }
            },
          }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .hidden-element { display: none !important; }
        video, audio { width: 100%; border-radius: 0.5rem; margin-top: 1rem; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen">
<header class="bg-[#f8f9fa] flex justify-between items-center w-full px-8 py-4 sticky top-0 z-50 shadow-sm">
    <div class="flex items-center gap-8">
        <span class="text-xl font-extrabold text-[#0040a1] tracking-tight">The Editorial Scholar</span>
    </div>
    <div class="flex items-center gap-4">
        <div class="flex items-center bg-surface-container-high rounded-full p-1 mr-2">
            <button class="px-3 py-1 rounded-full text-[10px] font-bold bg-primary text-on-primary">EN</button>
            <button class="px-3 py-1 rounded-full text-[10px] font-bold text-secondary">ZH</button>
        </div>
    </div>
</header>

<main class="flex min-h-[calc(100vh-76px)]">
    <aside class="bg-[#f3f4f5] flex flex-col w-64 p-6 border-r border-slate-200/20 text-sm sticky top-[76px]">
        <div class="mb-8">
            <div class="text-lg font-black text-[#0040a1] mb-1">Cognitive Workspace</div>
            <div class="text-xs font-semibold text-secondary uppercase tracking-widest opacity-70">Bilingual Synthesis</div>
        </div>
        <button class="mt-auto bg-primary text-on-primary py-3 rounded-xl font-bold flex justify-center items-center gap-2">
            <span class="material-symbols-outlined">add_circle</span> Start Session
        </button>
    </aside>

    <div class="flex-grow p-8 lg:p-12 overflow-y-auto">
        <div class="grid grid-cols-12 gap-8 max-w-7xl mx-auto">
            
            <section class="col-span-12 lg:col-span-4 flex flex-col gap-6">
                <div class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm flex flex-col h-fit">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-bold text-gray-900">1. Media Center</h2>
                        <button id="cancelFileBtn" class="hidden-element text-xs font-bold text-error hover:bg-error/10 px-2 py-1 rounded transition-colors">
                            Remove File
                        </button>
                    </div>
                    
                    <input type="file" id="mediaUpload" class="hidden" accept="audio/*,video/*">
                    <label for="mediaUpload" id="uploadDropzone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 flex flex-col items-center justify-center text-center gap-4 hover:bg-blue-50 cursor-pointer transition-colors">
                        <span class="material-symbols-outlined text-4xl text-primary opacity-60">video_library</span>
                        <div>
                            <p class="font-semibold">Upload Source File</p>
                            <p class="text-xs text-secondary mt-1">Audio or Video</p>
                        </div>
                    </label>

                    <div id="mediaContainer" class="w-full"></div>
                </div>

                <div class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm flex flex-col h-fit">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-bold text-gray-900">2. Practice Recorder</h2>
                    </div>
                    <div class="flex flex-col items-center gap-4 py-2">
                        <div id="recordStatusText" class="text-sm font-bold tracking-tight text-secondary">Ready to record</div>
                        <div class="flex items-center gap-4 mt-2">
                            <button id="startRecordBtn" class="w-14 h-14 rounded-full bg-tertiary flex items-center justify-center text-on-tertiary shadow-lg hover:scale-105 transition-transform">
                                <span class="material-symbols-outlined">mic</span>
                            </button>
                            <button id="stopRecordBtn" disabled class="bg-gray-200 text-gray-500 px-4 py-2 rounded-full text-xs font-bold transition-all">
                                Stop & Save
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="col-span-12 lg:col-span-8">
                <div class="bg-surface-container-lowest rounded-2xl shadow-sm flex flex-col h-full min-h-[600px] border border-gray-100">
                    <div class="flex border-b border-gray-200 px-6 items-center">
                        <div class="flex gap-4">
                            <label class="py-5 text-sm font-bold cursor-pointer flex items-center gap-2">
                                <input type="radio" name="textSource" id="sourceFile" value="file" class="text-primary"> 
                                <span id="sourceFileLabel" class="text-gray-400">Extract from File</span>
                            </label>
                            <label class="py-5 text-sm font-bold cursor-pointer flex items-center gap-2">
                                <input type="radio" name="textSource" id="sourceManual" value="manual" checked class="text-primary"> 
                                <span>Manual Entry</span>
                            </label>
                        </div>
                        <div class="ml-auto flex items-center gap-2">
                            <button id="extractTextBtn" class="hidden-element bg-primary text-white text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-blue-700">
                                Simulate Extraction
                            </button>
                            <button id="clearTextBtn" class="flex items-center gap-1.5 text-xs font-bold text-secondary hover:text-error transition-colors px-3 py-1.5 rounded-lg">
                                <span class="material-symbols-outlined text-sm">backspace</span> Clear Text
                            </button>
                        </div>
                    </div>

                    <div class="p-6 flex flex-col flex-grow">
                        <textarea id="textArea" maxlength="10000" placeholder="Type your transcription or notes here..." class="w-full flex-grow resize-none outline-none text-lg leading-relaxed text-gray-800 bg-transparent border-0 focus:ring-0 p-0"></textarea>
                        
                        <div class="mt-4 pt-4 flex justify-between items-center text-[10px] font-bold text-secondary uppercase tracking-widest border-t border-gray-100">
                            <span>Status: Local Sandbox</span>
                            <span>Characters: <span id="charCount">0</span> / 10000</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>

<script>
    // DOM 元素挂载
    const mediaUpload = document.getElementById('mediaUpload');
    const uploadDropzone = document.getElementById('uploadDropzone');
    const cancelFileBtn = document.getElementById('cancelFileBtn');
    const mediaContainer = document.getElementById('mediaContainer');
    
    const startRecordBtn = document.getElementById('startRecordBtn');
    const stopRecordBtn = document.getElementById('stopRecordBtn');
    const recordStatusText = document.getElementById('recordStatusText');
    
    const sourceFile = document.getElementById('sourceFile');
    const sourceManual = document.getElementById('sourceManual');
    const sourceFileLabel = document.getElementById('sourceFileLabel');
    const extractTextBtn = document.getElementById('extractTextBtn');
    const textArea = document.getElementById('textArea');
    const clearTextBtn = document.getElementById('clearTextBtn');
    const charCount = document.getElementById('charCount');

    // 状态机变量
    let mediaRecorder;
    let audioChunks = [];
    let isTextFromFile = false; 
    let currentFileUrl = null;

    // --- 模块 1: 物理文件挂载 ---
    mediaUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // 联动阻断纪律：若文本源于文件，上传新文件强制清空
        if (isTextFromFile) {
            textArea.value = '';
            updateCharCount();
        }

        clearMediaContainer();
        currentFileUrl = URL.createObjectURL(file);
        
        let mediaElement = document.createElement(file.type.startsWith('video/') ? 'video' : 'audio');
        mediaElement.src = currentFileUrl;
        mediaElement.controls = true; 
        mediaContainer.appendChild(mediaElement);

        uploadDropzone.classList.add('hidden-element');
        cancelFileBtn.classList.remove('hidden-element');
        sourceFileLabel.classList.remove('text-gray-400');
        sourceFileLabel.classList.add('text-primary');
        
        if (sourceFile.checked) extractTextBtn.classList.remove('hidden-element');
    });

    cancelFileBtn.addEventListener('click', function() {
        mediaUpload.value = ''; 
        clearMediaContainer();
        uploadDropzone.classList.remove('hidden-element');
        cancelFileBtn.classList.add('hidden-element');
        extractTextBtn.classList.add('hidden-element');
        sourceFileLabel.classList.add('text-gray-400');
        sourceFileLabel.classList.remove('text-primary');
    });

    function clearMediaContainer() {
        mediaContainer.innerHTML = '';
        if (currentFileUrl) {
            URL.revokeObjectURL(currentFileUrl);
            currentFileUrl = null;
        }
    }

    // --- 模块 2: 麦克风录音引擎 ---
    startRecordBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = event => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                await saveRecording(audioBlob);
            };

            mediaRecorder.start();
            
            // UI 状态切换
            startRecordBtn.classList.replace('bg-tertiary', 'bg-red-400');
            startRecordBtn.classList.add('animate-pulse');
            startRecordBtn.disabled = true;
            stopRecordBtn.disabled = false;
            stopRecordBtn.classList.replace('bg-gray-200', 'bg-primary');
            stopRecordBtn.classList.replace('text-gray-500', 'text-white');
            recordStatusText.innerText = 'Recording actively...';
            recordStatusText.classList.add('text-red-600');

        } catch (err) {
            console.error(err);
            alert('系统硬件麦克风权限被拒绝');
        }
    });

    stopRecordBtn.addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            
            // UI 状态复原
            startRecordBtn.classList.replace('bg-red-400', 'bg-tertiary');
            startRecordBtn.classList.remove('animate-pulse');
            startRecordBtn.disabled = false;
            stopRecordBtn.disabled = true;
            stopRecordBtn.classList.replace('bg-primary', 'bg-gray-200');
            stopRecordBtn.classList.replace('text-white', 'text-gray-500');
            recordStatusText.innerText = 'Processing file...';
            recordStatusText.classList.remove('text-red-600');
        }
    });

    async function saveRecording(blob) {
        if ('showSaveFilePicker' in window) {
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: `practice_${Date.now()}.webm`,
                    types: [{ description: 'WebM Audio', accept: {'audio/webm': ['.webm']} }]
                });
                const writable = await handle.createWritable();
                await writable.write(blob);
                await writable.close();
                recordStatusText.innerText = 'Saved securely to local disk.';
                return;
            } catch (err) {
                if (err.name === 'AbortError') {
                    recordStatusText.innerText = 'Save cancelled.';
                    return;
                }
            }
        }
        
        // 降级下载机制
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = `practice_${Date.now()}.webm`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        recordStatusText.innerText = 'Saved to default Downloads folder.';
    }

    // --- 模块 3: 文本模拟提取与联动逻辑 ---
    sourceFile.addEventListener('change', () => {
        if (mediaUpload.files.length > 0) extractTextBtn.classList.remove('hidden-element');
    });
    
    sourceManual.addEventListener('change', () => {
        extractTextBtn.classList.add('hidden-element');
        isTextFromFile = false; 
    });

    extractTextBtn.addEventListener('click', () => {
        if (!mediaUpload.files.length) return alert('缺少前置媒体文件挂载');
        
        extractTextBtn.disabled = true;
        extractTextBtn.innerText = 'Extracting...';
        extractTextBtn.classList.add('opacity-70', 'cursor-wait');

        // 模拟物理耗时
        setTimeout(() => {
            textArea.value = '[SYSTEM LOG] This is a simulated transcription extraction generated within the frontend sandbox. In a full-stack deployment, this area would receive payload from the ASR Webhook.';
            isTextFromFile = true; 
            updateCharCount();
            
            extractTextBtn.disabled = false;
            extractTextBtn.innerText = 'Simulate Extraction';
            extractTextBtn.classList.remove('opacity-70', 'cursor-wait');
        }, 1500);
    });

    textArea.addEventListener('input', () => {
        if (sourceManual.checked) isTextFromFile = false; 
        updateCharCount();
    });

    clearTextBtn.addEventListener('click', () => {
        textArea.value = '';
        updateCharCount();
        isTextFromFile = false;
    });

    function updateCharCount() { 
        charCount.textContent = textArea.value.length; 
    }
</script>
</body>
</html>
